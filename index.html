<form id="userForm">

<input
type="text"
id="username"
placeholder="Student Username"
required>

<input
type="email"
id="email"
placeholder="Email Address"
required>

<input
type="tel"
id="phone"
placeholder="Phone Number"
required>

<input
type="number"
id="fees"
placeholder="Fees Amount"
required>

<button type="submit">
Save Student
</button>

</form>

<p id="status"></p>
