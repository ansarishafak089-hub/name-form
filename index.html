<!DOCTYPE html>
<html lang="en">
<head>
<style>*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{

background:#121212;
display:flex;
justify-content:center;
align-items:center;
height:100vh;

}

.container{

width:400px;
background:#1e1e1e;
padding:30px;
border-radius:15px;

box-shadow:0 0 20px rgba(0,0,0,.5);

}

h1{

text-align:center;
margin-bottom:20px;
color:white;

}

input{

width:100%;
padding:15px;
margin:12px 0;

background:#2d2d2d;

border:none;

outline:none;

border-radius:8px;

color:white;

font-size:16px;

}

input::placeholder{

color:#aaa;

}

button{

width:100%;

padding:15px;

background:#3b82f6;

border:none;

color:white;

font-size:18px;

border-radius:8px;

cursor:pointer;

transition:.3s;

}

button:hover{

background:#2563eb;

}

#message{

margin-top:20px;

text-align:center;

color:#00ff88;

font-size:18px;

}</style>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Student Form</title>


</head>
<body>

<div class="container">

<h1>Student Registration</h1>

<form id="studentForm">

<input
type="text"
id="name"
placeholder="Student Name"
required
>

<input
type="email"
id="email"
placeholder="Email Address"
required
>

<input
type="tel"
id="phone"
placeholder="Phone Number"
required
>

<button type="submit">
Save Student
</button>

</form>

<p id="message"></p>

</div>

<script type="module" src="script.js">import { createClient } from "https://esm.sh/@supabase/supabase-js";

const supabaseUrl = "YOUR_SUPABASE_URL";
const supabaseKey = "YOUR_SUPABASE_ANON_KEY";

const supabase = createClient(supabaseUrl, supabaseKey);

const form = document.getElementById("studentForm");

const message = document.getElementById("message");

form.addEventListener("submit", async (e)=>{

e.preventDefault();

const name=document.getElementById("name").value;
const email=document.getElementById("email").value;
const phone=document.getElementById("phone").value;

const {error}=await supabase
.from("students")
.insert([
{
name,
email,
phone
}
]);

if(error){

message.style.color="red";
message.innerText=error.message;

}else{

message.style.color="#00ff88";
message.innerText="Student Saved Successfully";

form.reset();

}

});</script>

</body>
</html>
