<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Fees Form</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    background:#111827;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    width:400px;
    background:#1f2937;
    padding:30px;
    border-radius:20px;
    box-shadow:0 0 20px rgba(0,0,0,0.5);
}

h1{
    color:white;
    text-align:center;
    margin-bottom:25px;
}

.input-box{
    margin-bottom:15px;
}

label{
    display:block;
    color:#d1d5db;
    margin-bottom:8px;
}

input, select{
    width:100%;
    padding:12px;
    border:none;
    outline:none;
    border-radius:10px;
    background:#374151;
    color:white;
    font-size:16px;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#3b82f6;
    color:white;
    font-size:18px;
    cursor:pointer;
    margin-top:15px;
}

button:hover{
    background:#2563eb;
}

#message{
    color:#10b981;
    text-align:center;
    margin-top:15px;
}
</style>
</head>
<body>

<div class="container">
    <h1>Student Fees Form</h1>

    <form id="feesForm">

        <div class="input-box">
            <label>Name</label>
            <input type="text" id="name" required>
        </div>

        <div class="input-box">
            <label>Phone Number</label>
            <input type="tel" id="phone" required>
        </div>

        <div class="input-box">
            <label>Fees Amount</label>
            <input type="number" id="fees" required>
        </div>

        <div class="input-box">
            <label>Standard</label>
            <select id="std" required>
                <option value="">Select Standard</option>
                <option>1</option>
                <option>2</option>
                <option>3</option>
                <option>4</option>
                <option>5</option>
                <option>6</option>
                <option>7</option>
                <option>8</option>
                <option>9</option>
                <option>10</option>
            </select>
        </div>

        <div class="input-box">
            <label>Division</label>
            <select id="division" required>
                <option value="">Select Division</option>
                <option>A</option>
                <option>B</option>
                <option>C</option>
                <option>D</option>
            </select>
        </div>

        <button type="submit">Submit Fees</button>

        <p id="message"></p>

    </form>
</div>

<script type="module">

import { createClient }
from 'https://esm.sh/@supabase/supabase-js';

const supabaseUrl =
'https://zwczrfjffrfdwsvzlymn.supabase.co';

const supabaseKey =
'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp3Y3pyZmpmZnJmZHdzdnpseW1uIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI5ODg2ODEsImV4cCI6MjA5ODU2NDY4MX0.5OE7HUaNnoKWGY2CF533m921zOSVnckCMJmDTQ8LSmE';

const supabase =
createClient(supabaseUrl, supabaseKey);

const form =
document.getElementById('feesForm');

form.addEventListener('submit', async (e)=>{
    e.preventDefault();

    const name =
    document.getElementById('name').value;

    const phone =
    document.getElementById('phone').value;

    const fees =
    document.getElementById('fees').value;

    const std =
    document.getElementById('std').value;

    const division =
    document.getElementById('division').value;

    const { error } =
    await supabase
    .from('student_fees')
    .insert([
        {
            name: name,
            phone: phone,
            fees_amount: fees,
            standard: std,
            division: division
        }
    ]);

    const msg =
    document.getElementById('message');

    if(error){
        msg.style.color = 'red';
        msg.innerText =
        'Error : ' + error.message;
    }
    else{
        msg.style.color = '#10b981';
        msg.innerText =
        'Fees Submitted Successfully!';

        form.reset();
    }
});

</script>

</body>
</html>
